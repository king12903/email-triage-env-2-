version = 1
requires-python = ">=3.11"

[[package]]
name = "email-triage-env"
version = "1.0.0"
source = { virtual = "." }
dependencies = [
  { name = "fastapi" },
  { name = "uvicorn" },
  { name = "pydantic" },
  { name = "openai" },
  { name = "pyyaml" },
  { name = "openenv-core" },
]

[[package]]
name = "fastapi"
version = "0.110.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "uvicorn"
version = "0.29.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pydantic"
version = "2.6.4"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openai"
version = "1.14.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pyyaml"
version = "6.0.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openenv-core"
version = "0.2.0"
source = { registry = "https://pypi.org/simple" }
